<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keeta Scanner</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#ffd800,#ffe600,#17d3b5);
  color:#111;
  padding:18px;
}

.container{max-width:950px;margin:auto}

.card{
  background:rgba(255,255,255,.9);
  border-radius:28px;
  padding:22px;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.keeta-logo{
  width:100px;
  height:60px;
  object-fit:contain;
  background:#fff;
  border-radius:14px;
  padding:6px;
}

.actions{display:flex;gap:10px}

button{
  border:none;
  border-radius:14px;
  padding:12px 16px;
  font-weight:bold;
  cursor:pointer;
}

.main-btn{background:#ffd800}
.sec-btn{background:#17d3b5;color:#fff}

.camera-wrap{
  position:relative;
  border-radius:20px;
  overflow:hidden;
  background:#000;
  min-height:340px;
}

#reader{width:100%}

.scan-box{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:280px;height:180px;
  border:3px solid #fff;
  border-radius:18px;
  box-shadow:0 0 0 9999px rgba(0,0,0,.4);
}

.status{text-align:center;margin-top:12px}

.box{
  margin-top:20px;
  background:#fff;
  border-radius:18px;
  padding:16px;
}

#productImage{
  width:220px;
  display:none;
  margin:10px auto;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="header">
  <div class="brand">
    <img src="https://img-ap-hongkong.mykeeta.net/sailorfempcpublic/keeta_icon.png" class="keeta-logo">
    <h2>Keeta Scanner</h2>
  </div>

  <div class="actions">
    <button class="main-btn" onclick="startScanner()">تشغيل</button>
    <button class="sec-btn" onclick="stopScanner()">إيقاف</button>
    <button class="sec-btn" onclick="toggleFlash()">فلاش</button>
  </div>
</div>

<div class="camera-wrap">
  <div id="reader"></div>
  <div class="scan-box"></div>
</div>

<div class="status" id="statusText">اضغط تشغيل</div>

<div class="box">
<p>الباركود: <span id="barcodeText">—</span></p>
<p>الاسم: <span id="productName">—</span></p>
<p>السعر: <span id="priceText">—</span></p>
<p>الدولة: <span id="countryText">—</span></p>
<img id="productImage">
</div>

</div>
</div>

<!-- 🔊 صوت شغال فعلي -->
<audio id="beep" preload="auto">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1a2c.mp3">
</audio>

<script>
let scanner=null;
let flashOn=false;
let audioEnabled=false;

function updateStatus(t){
  document.getElementById("statusText").innerText=t;
}

function enableAudio(){
  const audio=document.getElementById("beep");
  audio.play().then(()=>{
    audio.pause();
    audio.currentTime=0;
    audioEnabled=true;
  }).catch(()=>{});
}

async function playBeep(){
  try{
    const audio=document.getElementById("beep");
    audio.currentTime=0;
    await audio.play();
  }catch(e){}
}

async function startScanner(){
  enableAudio(); // 🔥 حل مشكلة الصوت

  scanner=new Html5Qrcode("reader");

  await scanner.start(
    {facingMode:"environment"},
    {fps:30, qrbox:{width:280,height:180}},
    async(text)=>{
      document.getElementById("barcodeText").innerText=text;
      playBeep();
      fetchProduct(text);
    }
  );

  updateStatus("وجّه الكاميرا");
}

async function stopScanner(){
  if(scanner){
    await scanner.stop();
    scanner=null;
  }
}

async function toggleFlash(){
  if(!scanner) return;

  flashOn=!flashOn;
  try{
    await scanner.applyVideoConstraints({
      advanced:[{torch:flashOn}]
    });
  }catch(e){
    updateStatus("الفلاش غير مدعوم");
  }
}

async function fetchProduct(code){
  updateStatus("جاري البحث...");

  try{
    let res=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    let data=await res.json();

    if(data.status==1){
      let p=data.product;

      document.getElementById("productName").innerText=p.product_name || "غير معروف";
      document.getElementById("countryText").innerText=p.countries || "—";

      document.getElementById("priceText").innerText=
        p.price || p.price_per_unit || "غير متوفر";

      let img=document.getElementById("productImage");
      img.src=p.image_front_url || p.image_url || "";
      img.style.display="block";

      updateStatus("تم التعرف");

    }else{
      updateStatus("غير موجود");
    }

  }catch(e){
    updateStatus("خطأ");
  }
}
</script>

</body>
</html>
