<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keeta Scanner</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  background:linear-gradient(135deg,#ffd800,#ffe600,#17d3b5);
  padding:18px;
  color:#111;
}

.container{max-width:900px;margin:auto}

.card{
  background:#fff;
  border-radius:25px;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.keeta-logo{
  width:90px;
}

.actions{display:flex;gap:10px}

button{
  border:none;
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

.main-btn{background:#ffd800}
.sec-btn{background:#17d3b5;color:#fff}

.camera-wrap{
  position:relative;
  margin-top:15px;
  background:#000;
  border-radius:20px;
  overflow:hidden;
}

.scan-box{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:260px;height:160px;
  border:3px solid #fff;
  border-radius:15px;
  box-shadow:0 0 0 9999px rgba(0,0,0,.4);
}

.status{text-align:center;margin-top:10px}

.box{
  margin-top:20px;
  background:#f5f5f5;
  padding:15px;
  border-radius:15px;
}

#productImage{
  width:200px;
  display:none;
  margin:10px auto;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="header">
  <div class="brand">
    <img src="https://img-ap-hongkong.mykeeta.net/sailorfempcpublic/keeta_icon.png" class="keeta-logo">
    <h2>Keeta Scanner</h2>
  </div>

  <div class="actions">
    <button class="main-btn" onclick="startScanner()">تشغيل</button>
    <button class="sec-btn" onclick="stopScanner()">إيقاف</button>
    <button class="sec-btn" onclick="toggleFlash()">فلاش</button>
  </div>
</div>

<div class="camera-wrap">
  <div id="reader"></div>
  <div class="scan-box"></div>
</div>

<div class="status" id="status">اضغط تشغيل</div>

<div class="box">
<p>الباركود: <span id="code">—</span></p>
<p>الاسم: <span id="name">—</span></p>
<p>السعر: <span id="price">—</span></p>
<p>الدولة: <span id="country">—</span></p>
<img id="productImage">
</div>

</div>
</div>

<script>
let scanner=null;
let flash=false;
let audioCtx=null;

// 🔊 صوت
function beep(){
  try{
    if(!audioCtx){
      audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    }

    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();

    osc.type="square";
    osc.frequency.setValueAtTime(900,audioCtx.currentTime);

    gain.gain.setValueAtTime(1,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime+0.2);

  }catch(e){}
}

// 🚫 منع السبام
let lastCode=null;
let scanningLocked=false;

async function onScan(code){

  if(scanningLocked || code===lastCode) return;

  scanningLocked=true;
  lastCode=code;

  document.getElementById("code").innerText=code;

  beep();

  if(navigator.vibrate){
    navigator.vibrate(150);
  }

  await fetchProduct(code);

  setTimeout(()=>{
    scanningLocked=false;
  },2000);
}

async function startScanner(){
  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  }

  scanner=new Html5Qrcode("reader");

  await scanner.start(
    {facingMode:"environment"},
    {fps:30,qrbox:{width:260,height:160}},
    onScan
  );

  document.getElementById("status").innerText="وجّه الكاميرا";
}

async function stopScanner(){
  if(scanner){
    await scanner.stop();
    scanner=null;
  }
}

async function toggleFlash(){
  if(!scanner) return;

  flash=!flash;
  try{
    await scanner.applyVideoConstraints({
      advanced:[{torch:flash}]
    });
  }catch(e){
    alert("الفلاش غير مدعوم");
  }
}

async function fetchProduct(code){
  document.getElementById("status").innerText="جاري البحث...";

  try{
    let res=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    let data=await res.json();

    if(data.status==1){
      let p=data.product;

      document.getElementById("name").innerText=p.product_name||"—";
      document.getElementById("country").innerText=p.countries||"—";
      document.getElementById("price").innerText=p.price||p.price_per_unit||"—";

      let img=document.getElementById("productImage");
      img.src=p.image_front_url||p.image_url||"";
      img.style.display="block";

      document.getElementById("status").innerText="تم التعرف";
    }else{
      document.getElementById("status").innerText="غير موجود";
    }

  }catch(e){
    document.getElementById("status").innerText="خطأ";
  }
}
</script>

</body>
</html>
