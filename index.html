<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keeta Scanner</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#ffd800,#ffe600,#17d3b5);
  color:#111;
  padding:18px;
}

.container{max-width:950px;margin:auto}

.card{
  background:rgba(255,255,255,.82);
  border-radius:28px;
  padding:22px;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  margin-bottom:18px;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.keeta-logo{
  width:120px;
  height:60px;
  object-fit:contain;
  border-radius:16px;
  background:#fff;
  padding:8px 12px;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button{
  border:none;
  border-radius:16px;
  padding:14px 18px;
  font-weight:bold;
  cursor:pointer;
}

.main-btn{background:#ffd800;color:#111}
.sec-btn{background:#17d3b5;color:#fff}

.camera-wrap{
  position:relative;
  width:100%;
  min-height:360px;
  border-radius:24px;
  overflow:hidden;
  background:#000;
}

#reader{width:100%}

.scan-box{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:280px;height:180px;
  border:3px solid #fff;
  border-radius:18px;
  box-shadow:0 0 0 9999px rgba(0,0,0,.35);
}

.status{text-align:center;margin-top:16px}

.box{
  margin-top:22px;
  background:rgba(255,255,255,.6);
  border-radius:22px;
  padding:20px;
}

#productImage{
  width:240px;
  max-width:100%;
  display:none;
  margin:18px auto 0;
  border-radius:18px;
  background:#fff;
  padding:10px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="header">
  <div class="brand">
    <!-- ✅ الشعار الجديد -->
    <img src="https://img-ap-hongkong.mykeeta.net/sailorfempcpublic/keeta_icon.png" class="keeta-logo">
    <div>
      <h1>Keeta Scanner</h1>
      <p>ماسح باركود ذكي</p>
    </div>
  </div>

  <div class="actions">
    <button class="main-btn" onclick="startScanner()">تشغيل</button>
    <button class="sec-btn" onclick="stopScanner()">إيقاف</button>
    <button class="sec-btn" onclick="toggleFlash()">فلاش</button>
  </div>
</div>

<div class="camera-wrap">
  <div id="reader"></div>
  <div class="scan-box"></div>
</div>

<div class="status" id="statusText">اضغط تشغيل الكاميرا</div>

<div class="box">
  <p>الباركود: <span id="barcodeText">—</span></p>
  <p>اسم المنتج: <span id="productName">—</span></p>
  <p>السعر: <span id="priceText">—</span></p>
  <p>الدولة: <span id="countryText">—</span></p>
  <img id="productImage">
</div>

</div>
</div>

<!-- ✅ صوت طوط أقوى -->
<audio id="beep">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1a2c.mp3">
</audio>

<script>
let scanner=null;
let flashOn=false;

function updateStatus(t){
  document.getElementById("statusText").innerText=t;
}

function playBeep(){
  let a=document.getElementById("beep");
  a.currentTime=0;
  a.play();
}

async function startScanner(){
  scanner=new Html5Qrcode("reader");

  await scanner.start(
    {facingMode:"environment"},
    {fps:30,qrbox:{width:280,height:180}},
    async (text)=>{
      document.getElementById("barcodeText").innerText=text;
      playBeep();
      fetchProduct(text);
    }
  );

  updateStatus("وجّه الكاميرا على الباركود");
}

async function stopScanner(){
  if(scanner){
    await scanner.stop();
    scanner=null;
  }
}

async function toggleFlash(){
  if(!scanner) return;

  flashOn=!flashOn;
  try{
    await scanner.applyVideoConstraints({
      advanced:[{torch:flashOn}]
    });
  }catch(e){
    updateStatus("الفلاش غير مدعوم");
  }
}

async function fetchProduct(code){
  updateStatus("جاري البحث...");

  try{
    let res=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    let data=await res.json();

    if(data.status==1){
      let p=data.product;

      document.getElementById("productName").innerText=p.product_name || "غير متوفر";
      document.getElementById("countryText").innerText=p.countries || "—";

      // ✅ السعر (إذا متوفر)
      document.getElementById("priceText").innerText=
        p.price || p.price_per_unit || "غير متوفر";

      // ✅ الصورة
      let img=document.getElementById("productImage");
      img.src=p.image_front_url || p.image_url || "";
      img.style.display="block";

      updateStatus("تم العثور على المنتج");

    }else{
      updateStatus("المنتج غير موجود");
    }

  }catch(e){
    updateStatus("خطأ في الاتصال");
  }
}
</script>

</body>
</html>
